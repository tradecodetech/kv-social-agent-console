// TAB: CONTENT STUDIO
// ═════════════════════════════════════════════════════════════════════════════
const TabStudio = () => {
  const [mode, setMode] = useState('post');
  const [clients, setClients] = useState([]);
  const [industry, setIndustry] = useState('trading');
  const [pageName, setPageName] = useState('');
  const [topic, setTopic] = useState('');
  const [contentType, setContentType] = useState('educational');
  const [keyword, setKeyword] = useState('');
  const [service, setService] = useState('');
  const [comment, setComment] = useState('');
  const [postContext, setPostContext] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    api('/api/clients').then(r=>{
      setClients(r.clients||[]);
      if (r.clients?.length) { const c=r.clients[0]; setIndustry(c.industry||'trading'); setPageName(c.name||''); }
    }).catch(()=>{});
  }, []);

  const selectClient = (name) => {
    const c = clients.find(x=>x.name===name);
    setPageName(name);
    if (c) setIndustry(c.industry||'trading');
  };

  const generate = async () => {
    setLoading(true); setResult(null);
    try {
      let r;
      if (mode==='post')    r = await post('/api/generate',       { industry, page_name:pageName, content_type:contentType, topic:topic||undefined });
      if (mode==='viral')   r = await post('/api/generate/viral', { industry, page_name:pageName, topic:topic||undefined });
      if (mode==='lead')    r = await post('/api/generate/lead',  { industry, page_name:pageName, keyword:keyword||undefined, service:service||undefined });
      if (mode==='calendar')r = await post('/api/calendar/generate', { industry, page_name:pageName });
      if (mode==='comment') r = await post('/api/comments/suggest', { industry, page_name:pageName, comment, post_context:postContext });
      setResult(r);
    } catch(e) { toast(e.message,'error'); }
    finally { setLoading(false); }
  };

  const copyText = (t) => { navigator.clipboard.writeText(t); toast('Copied!'); };

  // Style Analyzer mode — render full analyzer component
  if (mode === 'style') {
    return (
      <div className="fade-in">
        <div className="grid grid-cols-12 gap-5">
          {/* Left nav — same as other modes */}
          <div className="col-span-12 md:col-span-4">
            <Card>
              <h3 className="text-sm font-semibold text-white mb-3">Content Mode</h3>
              <div className="space-y-1">
                {[
                  { id:'post',     label:'Standard Post',    icon:I.studio,   desc:'Educational, promotional, testimonial' },
                  { id:'viral',    label:'High Engagement',  icon:I.zap,      desc:'Designed for comments & shares' },
                  { id:'lead',     label:'Lead Generation',  icon:I.target,   desc:'Comment-to-DM keyword posts' },
                  { id:'calendar', label:'30-Day Calendar',  icon:I.calendar, desc:'Full month content plan' },
                  { id:'comment',  label:'Comment Reply',    icon:I.msg,      desc:'AI-suggested reply options' },
                  { id:'style',    label:'Style Analyzer',   icon:I.sparkles, desc:'Analyze & replicate top-performing styles', badge:'NEW' },
                ].map(m => (
                  <button key={m.id} onClick={()=>{ setMode(m.id); setResult(null); }}
                    className={`w-full text-left p-3 rounded-lg border transition-all ${mode===m.id?'bg-cyan-500/15 border-cyan-500/40 text-cyan-300':'border-transparent hover:bg-slate-700/50 text-slate-300'}`}>
                    <div className="flex items-center gap-2">
                      <Icon d={m.icon} size={14} />
                      <span className="text-sm font-medium">{m.label}</span>
                      {m.badge && <span className="text-xs bg-cyan-500/20 text-cyan-400 px-1.5 py-0.5 rounded ml-auto">{m.badge}</span>}
                    </div>
                    <div className="text-xs text-slate-500 mt-0.5 pl-5">{m.desc}</div>
                  </button>
                ))}
              </div>
            </Card>
          </div>
          {/* Right: analyzer takes full width */}
          <div className="col-span-12 md:col-span-8">
            <StyleAnalyzer clients={clients} />
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="grid grid-cols-12 gap-5 fade-in">
      <div className="col-span-12 md:col-span-4 space-y-4">
        <Card>
          <h3 className="text-sm font-semibold text-white mb-3">Content Mode</h3>
          <div className="space-y-1">
            {[
              { id:'post',     label:'Standard Post',    icon:I.studio,   desc:'Educational, promotional, testimonial' },
              { id:'viral',    label:'High Engagement',  icon:I.zap,      desc:'Designed for comments & shares' },
              { id:'lead',     label:'Lead Generation',  icon:I.target,   desc:'Comment-to-DM keyword posts' },
              { id:'calendar', label:'30-Day Calendar',  icon:I.calendar, desc:'Full month content plan' },
              { id:'comment',  label:'Comment Reply',    icon:I.msg,      desc:'AI-suggested reply options' },
              { id:'style',    label:'Style Analyzer',   icon:I.sparkles, desc:'Analyze & replicate top-performing styles', badge:'NEW' },
            ].map(m => (
              <button key={m.id} onClick={()=>{setMode(m.id);setResult(null);}}
                className={`w-full text-left p-3 rounded-lg border transition-all ${mode===m.id?'bg-cyan-500/15 border-cyan-500/40 text-cyan-300':'border-transparent hover:bg-slate-700/50 text-slate-300'}`}>
                <div className="flex items-center gap-2">
                  <Icon d={m.icon} size={14} />
                  <span className="text-sm font-medium">{m.label}</span>
                  {m.badge && <span className="text-xs bg-cyan-500/20 text-cyan-400 px-1.5 py-0.5 rounded ml-auto">{m.badge}</span>}
                </div>
                <div className="text-xs text-slate-500 mt-0.5 pl-5">{m.desc}</div>
              </button>
            ))}
          </div>
        </Card>

        <Card>
          <h3 className="text-sm font-semibold text-white mb-3">Settings</h3>
          <div className="space-y-3">
            <div>
              <Label>Client</Label>
              <Select value={pageName} onChange={e=>selectClient(e.target.value)}>
                <option value="">— Custom —</option>
                {clients.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}
              </Select>
            </div>
            <div>
              <Label>Industry</Label>
              <Select value={industry} onChange={e=>setIndustry(e.target.value)}>
                {INDUSTRIES.map(i=><option key={i.value} value={i.value}>{i.icon} {i.label}</option>)}
              </Select>
            </div>
            {!pageName && (
              <div>
                <Label>Page / Brand Name</Label>
                <Input value={pageName} onChange={e=>setPageName(e.target.value)} placeholder="Your brand name" />
              </div>
            )}
            {mode==='post' && (
              <div>
                <Label>Content Type</Label>
                <Select value={contentType} onChange={e=>setContentType(e.target.value)}>
                  {CONTENT_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
                </Select>
              </div>
            )}
            {(mode==='post'||mode==='viral') && (
              <div>
                <Label>Topic (optional)</Label>
                <Input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="Leave blank for AI to choose" />
              </div>
            )}
            {mode==='lead' && (
              <>
                <div><Label>Keyword CTA</Label><Input value={keyword} onChange={e=>setKeyword(e.target.value)} placeholder="e.g. QUOTE, FREE, YES" /></div>
                <div><Label>Service</Label><Input value={service} onChange={e=>setService(e.target.value)} placeholder="e.g. lawn cleanup" /></div>
              </>
            )}
            {mode==='comment' && (
              <>
                <div><Label>Customer Comment</Label><Textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="How much does it cost?" rows={2} /></div>
                <div><Label>Post Context (optional)</Label><Input value={postContext} onChange={e=>setPostContext(e.target.value)} placeholder="What post was this on?" /></div>
              </>
            )}
            <Btn cls="w-full justify-center" onClick={generate} disabled={loading||!industry}>
              {loading?<Spinner/>:<Icon d={I.zap} size={14} />}
              {loading?'Generating…':'Generate'}
            </Btn>
          </div>
        </Card>
      </div>

      <div className="col-span-12 md:col-span-8">
        {!result && !loading && (
          <Card cls="text-center py-20 text-slate-500">
            <Icon d={I.studio} size={40} cls="mx-auto mb-3 text-slate-600" />
            <p className="text-sm">Select a mode and click Generate</p>
          </Card>
        )}
        {loading && (
          <Card cls="flex items-center justify-center h-64">
            <div className="text-center"><Spinner /><p className="text-sm text-slate-400 mt-3">AI is writing your content…</p></div>
          </Card>
        )}
        {result && !loading && (
          <div className="space-y-4 fade-in">
            {(mode==='post'||mode==='viral'||mode==='lead') && result.text && (
              <Card>
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-2">
                    <Badge color="cyan">{result.type||result.format||mode}</Badge>
                    {result.pillar && <Badge color="slate">{result.pillar.slice(0,40)}</Badge>}
                  </div>
                  <Btn size="sm" variant="ghost" onClick={()=>copyText(result.text)}><Icon d={I.copy} size={14} />Copy</Btn>
                </div>
                <div className="bg-slate-900/60 rounded-lg p-4 border border-slate-700">
                  <p className="text-sm text-slate-200 whitespace-pre-wrap leading-relaxed">{result.text||result.post}</p>
                </div>
                {result.keyword && <div className="mt-3 flex items-center gap-2"><span className="text-xs text-slate-500">Keyword CTA:</span><Badge color="yellow">{result.keyword}</Badge></div>}
                <div className="mt-4 pt-3 border-t border-slate-700 flex gap-2">
                  <Btn size="sm" variant="ghost" onClick={generate}><Icon d={I.refresh} size={14} />Regenerate</Btn>
                </div>
              </Card>
            )}
            {mode==='calendar' && (result.days||result.calendar) && <CalendarResult result={result} copyText={copyText} />}
            {mode==='comment' && result.replies && (
              <Card>
                <h3 className="text-sm font-semibold text-white mb-3">Suggested Replies</h3>
                <div className="mb-3 p-3 bg-slate-900/50 rounded-lg border border-slate-700">
                  <div className="text-xs text-slate-500 mb-1">Original comment:</div>
                  <p className="text-sm text-slate-200 italic">"{result.comment || comment}"</p>
                </div>
                <div className="space-y-3">
                  {result.replies.map((r,i) => (
                    <div key={i} className="p-3 bg-slate-900/50 rounded-lg border border-slate-700">
                      <div className="flex items-center justify-between mb-2">
                        <Badge color={i===0?'cyan':i===1?'green':'purple'}>{r.tone}</Badge>
                        <Btn size="sm" variant="ghost" onClick={()=>copyText(r.text)}><Icon d={I.copy} size={12} />Copy</Btn>
                      </div>
                      <p className="text-sm text-slate-200">{r.text}</p>
                    </div>
                  ))}
                </div>
              </Card>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

const CalendarResult = ({ result, copyText }) => {
  const days = result.days || result.calendar || [];
  const [expanded, setExpanded] = useState(null);
  const typeColors = { educational:'cyan', promotional:'yellow', engagement:'purple', testimonial:'green', lead_gen:'red', viral:'orange', rest:'slate' };
  return (
    <Card>
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-sm font-semibold text-white">30-Day Content Calendar</h3>
        <Btn size="sm" variant="ghost" onClick={()=>{
          const txt = days.map(d=>`Day ${d.day} [${d.type}]: ${d.topic||d.hook||''}\n${d.post_text||d.post||''}`).join('\n\n---\n\n');
          copyText(txt);
        }}><Icon d={I.copy} size={14} />Copy All</Btn>
      </div>
      <div className="grid grid-cols-7 gap-1">
        {days.map(d => (
          <button key={d.day} onClick={()=>setExpanded(expanded===d.day?null:d.day)}
            className={`p-2 rounded text-left transition-all border ${expanded===d.day?'border-cyan-500/50 bg-cyan-500/10':'border-transparent hover:bg-slate-700/50'}`}>
            <div className="text-xs text-slate-500">Day {d.day}</div>
            <Badge color={typeColors[d.type]||'slate'}>{d.type}</Badge>
          </button>
        ))}
      </div>
      {expanded && (() => {
        const d = days.find(x=>x.day===expanded);
        if (!d) return null;
        return (
          <div className="mt-4 p-4 bg-slate-900/60 rounded-lg border border-slate-700 fade-in">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-2">
                <span className="text-sm font-medium text-white">Day {d.day}</span>
                <Badge color={typeColors[d.type]||'slate'}>{d.type}</Badge>
              </div>
              <Btn size="sm" variant="ghost" onClick={()=>copyText(d.post_text||d.post||'')}><Icon d={I.copy} size={12} />Copy</Btn>
            </div>
            {d.topic && <p className="text-xs text-cyan-400 mb-2">{d.topic}</p>}
            <p className="text-sm text-slate-200 whitespace-pre-wrap">{d.post_text || d.post || 'No post today.'}</p>
          </div>
        );
      })()}
    </Card>
  );
};

// ═════════════════════════════════════════════════════════════════════════════
// TAB: LEAD INBOX
// ═════════════════════════════════════════════════════════════════════════════
const TabLeads = () => {
  const [leads, setLeads] = useState([]);
  const [stats, setStats] = useState(null);
  const [selected, setSelected] = useState(null);
  const [detail, setDetail] = useState(null);
  const [reply, setReply] = useState('');
  const [replyPage, setReplyPage] = useState('');
  const [filter, setFilter] = useState('all');
  const [sending, setSending] = useState(false);
  const [scanning, setScanning] = useState(false);
  const [clients, setClients] = useState([]);
  const [aiReplies, setAiReplies] = useState([]);
  const [generatingReplies, setGeneratingReplies] = useState(false);
  const [aiProvider, setAiProvider] = useState(() => localStorage.getItem('kv_ai_provider') || 'openai');
  const [anthropicKey, setAnthropicKey] = useState(() => localStorage.getItem('kv_anthropic_key') || '');
  const [showKeyInput, setShowKeyInput] = useState(false);

  const load = useCallback(async () => {
    const [l, s, c] = await Promise.all([
      api('/api/leads').catch(()=>({leads:[]})),
      api('/api/leads/stats').catch(()=>null),
      api('/api/clients').catch(()=>({clients:[]})),
    ]);
    setLeads(l.leads||[]); setStats(s); setClients(c.clients||[]);
  }, []);

  useEffect(() => { load(); }, [load]);

  const loadDetail = async (id) => {
    setSelected(id);
    const d = await api(`/api/leads/${id}`).catch(()=>null);
    setDetail(d);
  };

  const updateStatus = async (id, status) => {
    await put(`/api/leads/${id}`, { status }).catch(e=>toast(e.message,'error'));
    toast('Status updated'); load();
    if (detail?.id === id) setDetail({...detail, status});
  };

  const sendReply = async () => {
    if (!reply.trim() || !selected) return;
    setSending(true);
    try {
      await post(`/api/leads/${selected}/message`, { lead_id:selected, message:reply, page_name:replyPage });
      toast('Reply sent'); setReply('');
      const d = await api(`/api/leads/${selected}`); setDetail(d);
    } catch(e) {
      let msg = '';
      try { msg = typeof e.message === 'string' ? e.message : JSON.stringify(e); } catch { msg = 'Send failed'; }
      if (msg.includes('valid ID') || msg.includes('recipient') || msg.includes('100')) {
        toast('DM requires pages_messaging approval from Meta. Lead is saved — reply manually via Facebook.', 'error');
      } else if (msg.includes('commenter ID') || msg.includes('No commenter')) {
        toast('No Facebook ID on this lead — comment was made before Live Mode. Delete and rescan.', 'error');
      } else {
        toast(msg || 'Send failed', 'error');
      }
    }
    finally { setSending(false); }
  };

  const generateReplies = async (lead) => {
    setGeneratingReplies(true);
    setAiReplies([]);
    try {
      const keyword = lead.trigger_keyword || 'INFO';
      const page = lead.page_name || 'our page';
      const industry = clients.find(c=>c.name===lead.page_name)?.industry || 'general';
      const comment = lead.comment_text || '';

      const systemPrompt = `You are a social media manager for ${page}, a ${industry} business. Generate exactly 3 short DM reply options for a lead who commented on a Facebook post. Return ONLY valid JSON array, no markdown, no explanation: [{"tone":"Warm","text":"reply here"},{"tone":"Direct","text":"reply here"},{"tone":"Value-first","text":"reply here"}]. Each reply: 2-3 sentences max. Sound human, helpful, not salesy.`;
      const userPrompt = `Lead commented "${comment}" with trigger keyword "${keyword}" on our Facebook post. Write 3 DM reply options.`;

      // Route through server — OpenAI uses .env key, Anthropic uses stored key
      const r = await fetch('http://localhost:7861/api/generate/reply-suggestions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_prompt: systemPrompt,
          user_prompt: userPrompt,
          page_name: page,
          industry: industry,
          keyword: keyword,
          comment: comment,
          provider: aiProvider,
          anthropic_key: aiProvider === 'anthropic' ? anthropicKey : '',
        })
      });
      const data = await r.json();
      if (data.error) throw new Error(data.error);
      setAiReplies(data.replies || []);
    } catch(e) { toast('Could not generate replies: ' + e.message, 'error'); }
    finally { setGeneratingReplies(false); }
  };

  const scan = async () => {
    setScanning(true);
    try {
      const r = await post('/api/leads/check-comments', { keywords: ['INFO','YES','FREE','QUOTE','JOIN'] });
      toast(`Scan complete — ${r.new_leads || 0} new lead(s) found`);
      load();
      setScanning(false);
    } catch(e) { toast(e.message,'error'); setScanning(false); }
  };

  const filtered = leads.filter(l => filter==='all' || l.status===filter);
  const statusColor = { new:'cyan', contacted:'yellow', qualified:'green', closed:'slate', lost:'red' };

  return (
    <div className="space-y-4 fade-in">
      {stats && (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          <StatCard label="Total Leads" value={stats.total_leads||0} />
          <StatCard label="New" value={stats.by_status?.new||0} color="text-cyan-400" />
          <StatCard label="Qualified" value={stats.by_status?.qualified||0} color="text-emerald-400" />
          <StatCard label="DMs Sent" value={stats.dm_sent||0} color="text-purple-400" />
        </div>
      )}
      <div className="grid grid-cols-12 gap-5">
        <div className="col-span-12 md:col-span-5">
          <Card>
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <Select value={filter} onChange={e=>setFilter(e.target.value)} cls="!w-auto text-xs py-1">
                  {['all','new','contacted','qualified','closed','lost'].map(s=>(
                    <option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>
                  ))}
                </Select>
                <span className="text-xs text-slate-500">{filtered.length} leads</span>
              </div>
              <Btn size="sm" variant="ghost" onClick={scan} disabled={scanning}>{scanning?<Spinner/>:<Icon d={I.refresh} size={14} />}Scan</Btn>
            </div>
            <div className="space-y-2 max-h-96 overflow-y-auto">
              {filtered.map(l => (
                <div key={l.id} onClick={()=>loadDetail(l.id)}
                  className={`p-3 rounded-lg cursor-pointer border transition-all ${selected===l.id?'bg-cyan-500/15 border-cyan-500/40':'border-slate-700/50 hover:bg-slate-700/30'}`}>
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-sm font-medium text-white">{l.commenter_name||'Unknown'}</span>
                    <Badge color={statusColor[l.status]||'slate'}>{l.status}</Badge>
                  </div>
                  <p className="text-xs text-slate-400 truncate">{l.comment_text}</p>
                  <div className="flex items-center gap-2 mt-1">
                    {l.trigger_keyword && <Badge color="yellow">{l.trigger_keyword}</Badge>}
                    <span className="text-xs text-slate-600">{l.ts?.slice(0,16)}</span>
                  </div>
                </div>
              ))}
              {!filtered.length && (
                <div className="text-center py-8">
                  <Icon d={I.inbox} size={32} cls="mx-auto mb-2 text-slate-600" />
                  <p className="text-sm text-slate-500">No leads yet</p>
                </div>
              )}
            </div>
          </Card>
        </div>
        <div className="col-span-12 md:col-span-7">
          {detail ? (
            <div className="space-y-4">
              <Card>
                <div className="flex items-center justify-between mb-3">
                  <div>
                    <h3 className="text-sm font-semibold text-white">{detail.commenter_name||'Unknown'}</h3>
                    {detail.phone && <p className="text-xs text-slate-400">{detail.phone}</p>}
                  </div>
                  <Badge color={statusColor[detail.status]||'slate'}>{detail.status}</Badge>
                </div>
                <div className="flex gap-2 flex-wrap">
                  {['new','contacted','qualified','closed','lost'].map(s => (
                    <Btn key={s} size="sm" variant={detail.status===s?'primary':'ghost'} onClick={()=>updateStatus(detail.id, s)}>{s}</Btn>
                  ))}
                </div>
              </Card>
              <Card>
                <h4 className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Conversation</h4>
                <div className="space-y-2 max-h-40 overflow-y-auto mb-3">
                  {detail.messages?.map((m,i) => (
                    <div key={i} className={`p-2 rounded text-xs ${m.direction==='outbound'?'bg-cyan-900/30 text-cyan-200 ml-8':'bg-slate-700/50 text-slate-300'}`}>
                      <span className="text-slate-500">[{m.channel}] </span>{m.message}
                    </div>
                  ))}
                  {!detail.messages?.length && <p className="text-xs text-slate-500">No messages yet</p>}
                </div>

                {/* AI Reply Suggestions */}
                <div className="mb-3 pb-3 border-b border-slate-700">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-xs font-medium text-slate-400">AI Reply Suggestions</span>
                    <div className="flex items-center gap-2">
                      <select value={aiProvider} onChange={e=>{
                        setAiProvider(e.target.value);
                        localStorage.setItem('kv_ai_provider', e.target.value);
                        if(e.target.value==='anthropic' && !anthropicKey) setShowKeyInput(true);
                      }} className="text-xs bg-slate-800 border border-slate-600 rounded px-2 py-1 text-slate-300">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                      </select>
                      <Btn size="sm" variant="ghost" onClick={()=>generateReplies(detail)} disabled={generatingReplies}>
                        {generatingReplies ? <Spinner/> : <Icon d={I.sparkles} size={12} />}
                        {generatingReplies ? 'Generating…' : 'Generate'}
                      </Btn>
                    </div>
                  </div>
                  {aiProvider==='anthropic' && (
                    <div className="mb-2">
                      {showKeyInput ? (
                        <div className="flex gap-2 items-center">
                          <input type="password" placeholder="sk-ant-..." value={anthropicKey}
                            onChange={e=>setAnthropicKey(e.target.value)}
                            className="flex-1 text-xs px-2 py-1 bg-slate-900 border border-slate-600 rounded text-white placeholder-slate-500" />
                          <Btn size="sm" onClick={()=>{
                            localStorage.setItem('kv_anthropic_key', anthropicKey);
                            setShowKeyInput(false);
                            toast('Anthropic key saved');
                          }}>Save</Btn>
                        </div>
                      ) : (
                        <div className="flex items-center gap-2">
                          <Badge color={anthropicKey?'green':'red'}>{anthropicKey?'Anthropic key saved':'No key'}</Badge>
                          <button onClick={()=>setShowKeyInput(true)} className="text-xs text-cyan-400 hover:underline">{anthropicKey?'Change':'Add key'}</button>
                        </div>
                      )}
                    </div>
                  )}
                  {aiReplies.length > 0 && (
                    <div className="space-y-2">
                      {aiReplies.map((r,i) => (
                        <div key={i} className="p-2 bg-slate-900/60 rounded-lg border border-slate-700 cursor-pointer hover:border-cyan-500/50 transition-all"
                          onClick={()=>setReply(r.text)}>
                          <div className="flex items-center justify-between mb-1">
                            <Badge color={i===0?'cyan':i===1?'green':'purple'}>{r.tone}</Badge>
                            <span className="text-xs text-slate-500">click to use</span>
                          </div>
                          <p className="text-xs text-slate-300">{r.text}</p>
                        </div>
                      ))}
                    </div>
                  )}
                  {!aiReplies.length && !generatingReplies && (
                    <p className="text-xs text-slate-600 italic">Click Generate for AI-crafted reply options based on this lead</p>
                  )}
                </div>

                <div className="space-y-2">
                  <Select value={replyPage} onChange={e=>setReplyPage(e.target.value)} cls="text-xs">
                    <option value="">Select page to send from…</option>
                    {clients.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}
                  </Select>
                  <div className="flex gap-2">
                    <Textarea value={reply} onChange={e=>setReply(e.target.value)} placeholder="Type a reply or click a suggestion above…" rows={2} cls="text-xs" />
                    <Btn onClick={sendReply} disabled={sending||!reply.trim()||!replyPage} cls="self-end">{sending?<Spinner/>:<Icon d={I.send} size={14} />}</Btn>
                  </div>
                </div>
              </Card>
            </div>
          ) : (
            <Card cls="text-center py-16 text-slate-500">
              <Icon d={I.inbox} size={40} cls="mx-auto mb-3 text-slate-600" />
              <p className="text-sm">Select a lead to view details</p>
            </Card>
          )}
        </div>
      </div>
    </div>
  );
};

// ═════════════════════════════════════════════════════════════════════════════
// TAB: ACTIVITY
// ═════════════════════════════════════════════════════════════════════════════
const TabActivity = () => {
  const [jobs, setJobs] = useState([]);
  const [logs, setLogs] = useState([]);
  const [diag, setDiag] = useState(null);
  const [tab, setTab] = useState('jobs');

  const load = useCallback(async () => {
    const [j, l, d] = await Promise.all([
      api('/api/jobs').catch(()=>({jobs:[]})),
      api('/api/logs?limit=30').catch(()=>({logs:[]})),
      api('/api/diagnose').catch(()=>null),
    ]);
    setJobs(j.jobs||[]); setLogs(l.logs||[]); setDiag(d);
  }, []);

  useEffect(() => { load(); const t = setInterval(load, 5000); return ()=>clearInterval(t); }, [load]);

  return (
    <div className="space-y-4 fade-in">
      {diag && (
        <Card cls={diag.overall_ok ? 'border-emerald-800 bg-emerald-900/20' : 'border-red-800 bg-red-900/20'}>
          <div className="flex items-center gap-3">
            <Icon d={diag.overall_ok?I.check:I.alert} size={16} cls={diag.overall_ok?'text-emerald-400':'text-red-400'} />
            <span className="text-sm font-medium text-white">{diag.overall_ok ? 'System Ready' : 'Configuration Issues Detected'}</span>
            <div className="flex gap-2 ml-auto flex-wrap">
              <Badge color={diag.openai_key?'green':'red'}>{diag.openai_key?'OpenAI ✓':'OpenAI missing'}</Badge>
              {diag.clients?.map((c,i)=>(
                <Badge key={i} color={c.ready?'green':'red'}>{c.name}: {c.ready?'Ready':'Not ready'}</Badge>
              ))}
            </div>
          </div>
        </Card>
      )}
      <div className="flex gap-2">
        {['jobs','logs'].map(t=>(
          <Btn key={t} size="sm" variant={tab===t?'primary':'ghost'} onClick={()=>setTab(t)}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
          </Btn>
        ))}
        <Btn size="sm" variant="ghost" onClick={load} cls="ml-auto"><Icon d={I.refresh} size={14} />Refresh</Btn>
      </div>
      {tab==='jobs' && (
        <Card>
          <div className="space-y-3">
            {jobs.map(j=>(
              <div key={j.id} className="p-3 bg-slate-900/50 rounded-lg border border-slate-700/50">
                <div className="flex items-center justify-between mb-1">
                  <span className="text-xs text-slate-400">{j.description}</span>
                  <Badge color={j.status==='done'?'green':j.status==='error'?'red':'yellow'}>{j.status}</Badge>
                </div>
                <div className="text-xs text-slate-600">{j.started_at?.slice(0,19)}</div>
                {j.results?.map((r,i)=>(
                  <div key={i} className="text-xs mt-1">
                    <span className={r.status==='success'?'text-emerald-400':'text-red-400'}>{r.status==='success'?'✓':'✗'}</span>
                    <span className="text-slate-400 ml-1">{r.client}</span>
                    {r.error && <span className="text-red-400 ml-2">{r.error}</span>}
                    {r.fb_post_id && <span className="text-slate-600 ml-2">ID: {r.fb_post_id}</span>}
                  </div>
                ))}
              </div>
            ))}
            {!jobs.length && <p className="text-sm text-slate-500 text-center py-8">No jobs yet.</p>}
          </div>
        </Card>
      )}
      {tab==='logs' && (
        <Card>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="text-slate-500 border-b border-slate-700">
                  <th className="text-left pb-2">Time</th><th className="text-left pb-2">Client</th>
                  <th className="text-left pb-2">Pillar</th><th className="text-left pb-2">Status</th>
                  <th className="text-left pb-2">FB Post ID</th>
                </tr>
              </thead>
              <tbody>
                {logs.map((l,i)=>(
                  <tr key={i} className="border-b border-slate-800 hover:bg-slate-700/20">
                    <td className="py-1.5 text-slate-500">{l.ts?.slice(0,16)}</td>
                    <td className="py-1.5 text-slate-300">{l.page_name}</td>
                    <td className="py-1.5 text-slate-400 max-w-xs truncate">{l.pillar}</td>
                    <td className="py-1.5"><Badge color={l.success?'green':'red'}>{l.success?'OK':'Fail'}</Badge></td>
                    <td className="py-1.5 text-slate-600 font-mono">{l.fb_post_id?.slice(0,20)||'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            {!logs.length && <p className="text-sm text-slate-500 text-center py-8">No logs yet</p>}
          </div>
        </Card>
      )}
    </div>
  );
};

// ═════════════════════════════════════════════════════════════════════════════
// TAB: ANALYTICS
// ═════════════════════════════════════════════════════════════════════════════
const TabAnalytics = () => {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    api('/api/analytics/summary').then(d=>{setData(d);setLoading(false);}).catch(()=>setLoading(false));
  }, []);
  if (loading) return <div className="flex items-center justify-center h-64"><Spinner /></div>;
  if (!data) return <Card cls="text-center py-16 text-slate-500">Could not load analytics</Card>;
  const dowData = Object.entries(data.posts_by_day_of_week||{}).map(([label,count])=>({label,count}));
  const pillarData = (data.top_pillars||[]).slice(0,8).map(p=>({label:p.pillar,count:p.count}));
  return (
    <div className="space-y-5 fade-in">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <StatCard label="Total Posts" value={data.total_posts} />
        <StatCard label="Successful" value={data.successful_posts} color="text-emerald-400" />
        <StatCard label="Success Rate" value={`${data.success_rate}%`} color={data.success_rate>90?'text-emerald-400':'text-yellow-400'} />
        <StatCard label="This Week" value={data.posts_this_week} color="text-cyan-400" />
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
        <Card><h3 className="text-sm font-semibold text-white mb-3">Posts by Day</h3><BarChart data={dowData} /></Card>
        <Card>
          <h3 className="text-sm font-semibold text-white mb-3">Posts by Client</h3>
          <div className="space-y-2">
            {data.posts_by_page?.map((p,i)=>(
              <div key={i} className="flex items-center gap-3">
                <div className="text-xs text-slate-300 w-32 truncate">{p.page}</div>
                <div className="flex-1 bg-slate-700 rounded-full h-2">
                  <div className="bg-cyan-500 h-2 rounded-full" style={{width:`${p.success_rate}%`}} />
                </div>
                <div className="text-xs text-slate-400 w-12 text-right">{p.total} posts</div>
                <Badge color={p.success_rate>90?'green':'yellow'}>{p.success_rate}%</Badge>
              </div>
            ))}
          </div>
        </Card>
        <Card><h3 className="text-sm font-semibold text-white mb-3">Top Pillars</h3><BarChart data={pillarData.map(p=>({label:p.label.slice(0,15),count:p.count}))} color="#a78bfa" /></Card>
        <Card><h3 className="text-sm font-semibold text-white mb-3">Last 30 Days</h3>{data.posts_last_30_days?.length>1?<SparkLine data={data.posts_last_30_days.map(d=>d.count)} height={80} />:<p className="text-sm text-slate-500 py-6 text-center">No data</p>}</Card>
      </div>
    </div>
  );
};

// ═════════════════════════════════════════════════════════════════════════════
// TAB: SETTINGS
// ═════════════════════════════════════════════════════════════════════════════
const TabSettings = ({ wl, setWl }) => {
  const [local, setLocal] = useState({...wl});
  const save = () => { setWl(local); localStorage.setItem(WL_KEY, JSON.stringify(local)); toast('Settings saved'); };
  return (
    <div className="max-w-lg space-y-5 fade-in">
      <Card>
        <h3 className="text-sm font-semibold text-white mb-4">White Label Branding</h3>
        <div className="space-y-4">
          <div><Label>Platform Name</Label><Input value={local.name} onChange={e=>setLocal({...local,name:e.target.value})} /></div>
          <div><Label>Logo Emoji</Label><Input value={local.logo} onChange={e=>setLocal({...local,logo:e.target.value})} cls="!w-24" /></div>
          <div><Label>Subtitle</Label><Input value={local.subtitle} onChange={e=>setLocal({...local,subtitle:e.target.value})} /></div>
          <div>
            <Label>Accent Color</Label>
            <div className="flex items-center gap-3">
              <input type="color" value={local.color} onChange={e=>setLocal({...local,color:e.target.value})} className="w-10 h-10 rounded cursor-pointer border border-slate-600 bg-transparent" />
              <Input value={local.color} onChange={e=>setLocal({...local,color:e.target.value})} cls="!w-32" />
            </div>
          </div>
        </div>
        <div className="flex gap-3 mt-5"><Btn onClick={save}>Save Branding</Btn><Btn variant="ghost" onClick={()=>setLocal({...DEFAULT_WL})}>Reset</Btn></div>
      </Card>
      <Card>
        <h3 className="text-sm font-semibold text-white mb-3">Server Connection</h3>
        <div className="flex items-center gap-2">
          <code className="text-xs text-slate-400 bg-slate-900 px-3 py-2 rounded">{API}</code>
          <Btn size="sm" variant="ghost" onClick={()=>api('/api/health').then(()=>toast('Connected')).catch(()=>toast('Cannot reach server','error'))}>Test</Btn>
        </div>
        <p className="text-xs text-slate-500 mt-2">Run: <code className="text-slate-400">py -m uvicorn server:app --port 7861 --reload</code></p>
      </Card>
    </div>
  );
};

// ═════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═════════════════════════════════════════════════════════════════════════════
const App = () => {
  const [tab, setTab] = useState('dashboard');
  const [serverOk, setServerOk] = useState(false);
  const [wl, setWl] = useState(() => {
    try { return JSON.parse(localStorage.getItem(WL_KEY)) || DEFAULT_WL; } catch { return DEFAULT_WL; }
  });

  useEffect(() => { document.documentElement.style.setProperty('--accent', wl.color); }, [wl.color]);

  useEffect(() => {
    const check = () => api('/api/health').then(()=>setServerOk(true)).catch(()=>setServerOk(false));
    check();
    const t = setInterval(check, 15000);
    return ()=>clearInterval(t);
  }, []);

  const TABS = [
    { id:'dashboard', label:'Dashboard',     icon:I.dash },
    { id:'clients',   label:'Clients',       icon:I.clients },
    { id:'studio',    label:'Content Studio',icon:I.studio },
    { id:'leads',     label:'Lead Inbox',    icon:I.inbox },
    { id:'activity',  label:'Activity',      icon:I.activity },
    { id:'analytics', label:'Analytics',     icon:I.analytics },
    { id:'settings',  label:'Settings',      icon:I.settings },
  ];

  return (
    <div className="min-h-screen bg-slate-900">
      <header className="border-b border-slate-700 bg-slate-900/80 backdrop-blur sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-lg flex items-center justify-center text-lg" style={{background:wl.color+'22',border:`1px solid ${wl.color}44`}}>
              {wl.logo}
            </div>
            <div>
              <div className="text-base font-bold text-white leading-tight">{wl.name}</div>
              <div className="text-xs" style={{color:wl.color+'bb'}}>{wl.subtitle}</div>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <div className={`w-2 h-2 rounded-full ${serverOk?'bg-emerald-400':'bg-red-500'}`} />
            <span className="text-xs text-slate-500">{serverOk?'Server Online':'Server Offline'}</span>
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-4">
          <nav className="flex gap-1 overflow-x-auto">
            {TABS.map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`flex items-center gap-1.5 px-3 py-2.5 text-xs font-medium whitespace-nowrap transition-all border-b-2 ${tab===t.id?'text-white':'text-slate-400 hover:text-slate-200 border-transparent'}`}
                style={tab===t.id?{borderColor:wl.color,color:wl.color}:{}}>
                <Icon d={t.icon} size={14} />
                {t.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6">
        {tab==='dashboard' && <TabDashboard serverOk={serverOk} />}
        {tab==='clients'   && <TabClients />}
        {tab==='studio'    && <TabStudio />}
        {tab==='leads'     && <TabLeads />}
        {tab==='activity'  && <TabActivity />}
        {tab==='analytics' && <TabAnalytics />}
        {tab==='settings'  && <TabSettings wl={wl} setWl={setWl} />}
      </main>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
